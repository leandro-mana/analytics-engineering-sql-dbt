version: 2

models:
  - name: stg_jaffle_shop__customers
    description: Staged customer data with renamed columns.
    columns:
      - name: customer_id
        description: Primary key.
        tests:
          - unique
          - not_null
      - name: first_name
        description: Customer first name.
      - name: last_name
        description: Customer last name.

  - name: stg_jaffle_shop__orders
    description: Staged order data with renamed columns and standardized types.
    columns:
      - name: order_id
        description: Primary key.
        tests:
          - unique
          - not_null
      - name: customer_id
        description: Foreign key to stg_jaffle_shop__customers.
        tests:
          - relationships:
              to: ref('stg_jaffle_shop__customers')
              field: customer_id
      - name: order_date
        description: Date the order was placed.
      - name: status
        description: Order status.
        tests:
          - accepted_values:
              values:
                - completed
                - shipped
                - returned
                - placed
                - return_pending
